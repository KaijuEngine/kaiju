<!DOCTYPE html>
<html>
	<head>
		<style>
			body {
				color: white;
			}
			#terrainPanel {
				position: absolute;
				left: 0;
				top: var(--ed-menu-bar-height);
				width: 18em;
				height: calc(100% - var(--ed-menu-bar-height) - var(--ed-status-bar-height));
				padding: 0.6em;
				background-color: rgb(18, 18, 18);
				border-right: 2px solid black;
				overflow-y: scroll;
			}
			#terrainPanel h2 {
				font-size: 1.1em;
				margin-bottom: 0.35em;
			}
			#terrainPanel h3 {
				font-size: 0.9em;
				margin-top: 0.8em;
				margin-bottom: 0.35em;
				color: #D8D8D8;
			}
			#terrainPanel button {
				height: 2em;
				margin-right: 0.25em;
				margin-bottom: 0.35em;
				background-color: #282828;
				color: #DDD;
				border: 2px solid #575757;
			}
			#terrainPanel button:hover {
				background-color: #575757;
				color: white;
			}
			#activeTerrainName, #terrainStatus, #terrainToolReadout {
				width: calc(100% - 0.6em);
				padding: 0.3em;
				margin-bottom: 0.4em;
				background-color: #202020;
				color: #DDD;
				border: 1px solid #444;
			}
			.field {
				width: 100%;
				margin-bottom: 0.35em;
			}
			.field span {
				width: 7em;
				font-size: 0.8em;
				color: #C8C8C8;
			}
			.field input, .field select {
				width: 7em;
				height: 1.7em;
			}
			.toolButton {
				width: 5em;
			}
			.actionButton {
				width: 6em;
			}
			#createTerrainDialog {
				position: absolute;
				left: 19em;
				top: calc(var(--ed-menu-bar-height) + 0.8em);
				width: 17em;
				padding: 0.7em;
				background-color: #121212;
				border: 3px solid #575757;
				z-index: 20;
			}
			input {
				height: 2em;
			}
		</style>
	</head>
	<body>
		<div id="terrainPanel">
			<h2>Terrain</h2>
			<input id="activeTerrainName" type="text" placeholder="Terrain name..." onsubmit="renameTerrain" />
			<button onclick="clickSelectTerrain">Select Terrain</button>
			<button onclick="clickCreateTerrain">Create Terrain</button>

			<h3>Tools</h3>
			<button class="toolButton" onclick="clickToolRaise">Raise</button>
			<button class="toolButton" onclick="clickToolLower">Lower</button>
			<button class="toolButton" onclick="clickToolSmooth">Smooth</button>
			<div id="terrainToolReadout">Raise / R 2.00 / S 0.25</div>

			<h3>Brush</h3>
			<div class="field">
				<span>Radius</span>
				<input id="brushRadius" type="number" value="2" onchange="brushChanged" onsubmit="brushChanged" />
			</div>
			<div class="field">
				<span>Strength</span>
				<input id="brushStrength" type="number" value="0.25" onchange="brushChanged" onsubmit="brushChanged" />
			</div>
			<div class="field">
				<span>Falloff</span>
				<select id="brushFalloff" onchange="brushChanged">
					<option value="smooth" selected>Smooth</option>
					<option value="linear">Linear</option>
					<option value="constant">Constant</option>
				</select>
			</div>

			<h3>Asset</h3>
			<button class="actionButton" onclick="clickSave">Save</button>
			<button class="actionButton" onclick="clickRevert">Revert</button>

			<h3>Status</h3>
			<div id="terrainStatus">Hover a terrain to inspect coordinates</div>
		</div>

		<div id="createTerrainDialog">
			<h3>Create Terrain</h3>
			<div class="field">
				<span>Resolution</span>
				<input id="createResolution" type="number" value="33" />
			</div>
			<div class="field">
				<span>Size X</span>
				<input id="createSizeX" type="number" value="100" />
			</div>
			<div class="field">
				<span>Size Z</span>
				<input id="createSizeZ" type="number" value="100" />
			</div>
			<div class="field">
				<span>Floor</span>
				<input id="createFloorHeight" type="number" value="-100" />
			</div>
			<div class="field">
				<span>Ceiling</span>
				<input id="createCeilingHeight" type="number" value="100" />
			</div>
			<div class="field">
				<span>Initial</span>
				<input id="createInitialHeight" type="number" value="0" />
			</div>
			<button onclick="clickConfirmCreate">Create</button>
			<button onclick="clickCancelCreate">Cancel</button>
		</div>
	</body>
</html>
