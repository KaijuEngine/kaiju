<!DOCTYPE html>
<html>
	<head>
		<style>
			div { width: 100%; }
			.topSearch { margin-top: 0.5em; margin-bottom: 0.5em; }
			#ftdePrompt {
				position: absolute;
				width: 400px;
				left: 21em;
				top: 4.5em;
				color: white;
				background-color: #682A2D;
				border: 5px solid #575757;
				border-radius: 5px;
				text-align: center;
				z-index: 20;
			}
			#ftdeArrow {
				position: absolute;
				color: white;
				left: 1em;
				font-size: 2em;
				text-align: left;
			}
			input {
				width: calc(100% - 1em);
				height: 2em;
				margin-left: 0.25em;
			}
			.sideBarStandard { height: calc(70% - 3em); }
			.sideBarTall { height: calc(100% - 3em); }
			#dimensionToggle {
				position: absolute;
				font-size: 0.6em;
				top: 2.5em;
				left: 50%;
				padding: 0.25em;
				transform: translateX(-50%);
				color: white;
				background-color: #282828;
				border: 2px solid #AAA;
			}
			#dimensionToggle:hover {
				background-color: #AAA;
			}
			#stageViewport {
				position: absolute;
				left: 0;
				top: var(--ed-menu-bar-height);
				width: 50%;
				height: calc(50% - var(--ed-menu-bar-height));
				z-index: -10;
				background-color: black;
			}
			#stageViewportTop {
				position: absolute;
				left: 50%;
				top: var(--ed-menu-bar-height);
				width: 50%;
				height: calc(50% - var(--ed-menu-bar-height));
				z-index: -10;
				background-color: black;
			}
			#stageViewportFront {
				position: absolute;
				left: 0;
				top: 50%;
				width: 50%;
				height: 50%;
				z-index: -10;
				background-color: black;
			}
			#stageViewportSide {
				position: absolute;
				left: 50%;
				top: 50%;
				width: 50%;
				height: 50%;
				z-index: -10;
				background-color: black;
			}
			.stageViewportLabel {
				position: absolute;
				left: 0.5em;
				color: white;
				background-color: #282828;
				border: 1px solid #555;
				padding: 0.2em 0.45em;
				font-size: 0.6em;
				z-index: 1;
			}
			#stageViewportLabelPerspective,
			#stageViewportLabelTop {
				top: calc(var(--ed-menu-bar-height) + 0.5em);
			}
			#stageViewportLabelFront,
			#stageViewportLabelSide {
				top: calc(50% + 0.5em);
			}
			#stageViewportLabelTop,
			#stageViewportLabelSide {
				left: calc(50% + 0.5em);
			}
		</style>
		<link rel="stylesheet" href="editor/ui/workspace/stage_workspace_hierarchy.css" />
		<link rel="stylesheet" href="editor/ui/workspace/stage_workspace_details.css" />
		<link rel="stylesheet" href="editor/ui/workspace/stage_workspace_content.css" />
	</head>
	<body>
		<img id="stageViewport" src="editor/textures/icons/menu_bar_logo.png" />
		<img id="stageViewportTop" src="editor/textures/icons/menu_bar_logo.png" />
		<img id="stageViewportFront" src="editor/textures/icons/menu_bar_logo.png" />
		<img id="stageViewportSide" src="editor/textures/icons/menu_bar_logo.png" />
		<span id="stageViewportLabelPerspective" class="stageViewportLabel">Perspective</span>
		<span id="stageViewportLabelTop" class="stageViewportLabel">Top</span>
		<span id="stageViewportLabelFront" class="stageViewportLabel">Front</span>
		<span id="stageViewportLabelSide" class="stageViewportLabel">Side</span>
		<!-- Floating UI -->
		<span id="dimensionToggle" onclick="toggleDimension">{{ .CameraMode }}</span>
		<!-- Hierarchy UI -->
		<kaiju-include src="editor/ui/workspace/stage_workspace_hierarchy.go.html"></kaiju-include>
		<!-- Details UI -->
		<kaiju-include src="editor/ui/workspace/stage_workspace_details.go.html"></kaiju-include>
		<!-- Content UI -->
		<kaiju-include src="editor/ui/workspace/stage_workspace_content.go.html"></kaiju-include>
		<!-- First time developer experience UI -->
		<div id="ftdePrompt">
			<div id="ftdeArrow">^</div>
			<br />
			<h1>Welcome to Kaiju!</h1>
			<p>
				It looks like this is your first time opening this project. Let's begin by opening up the "Content" workspace and importing some content for your game!
			</p>
		</div>
	</body>
</html>
