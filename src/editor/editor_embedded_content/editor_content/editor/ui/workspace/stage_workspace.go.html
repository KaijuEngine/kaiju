<!DOCTYPE html>
<html>
	<head>
		<style>
			#ftdePrompt {
				position: absolute;
				width: 400px;
				left: 21em;
				top: 4.5em;
				color: white;
				background-color: var(--ed-row-selected);
				border: 5px solid #575757;
				border-radius: 5px;
				text-align: center;
				z-index: 20;
			}
			#ftdeArrow {
				position: absolute;
				color: white;
				left: 1em;
				font-size: 2em;
				text-align: left;
			}
			#dimensionToggle {
				position: absolute;
				font-size: 0.6em;
				top: 2.5em;
				left: 50%;
				padding: 0.25em;
				transform: translateX(-50%);
				color: white;
				background-color: #282828;
				border: 2px solid #AAA;
				z-index: 3;
			}
			#dimensionToggle:hover {
				background-color: #AAA;
			}
		</style>
	</head>
	<body>
		<!-- Floating UI -->
		<span id="dimensionToggle" onclick="toggleDimension">{{ .CameraMode }}</span>
		<!-- First time developer experience UI -->
		<div id="ftdePrompt">
			<div id="ftdeArrow">^</div>
			<br />
			<h1>Welcome to Kaiju!</h1>
			<p>
				It looks like this is your first time opening this project. Let's begin by opening up the "Content" workspace and importing some content for your game!
			</p>
		</div>
	</body>
</html>
