<!DOCTYPE html>
<html>
	<head>
		<style>
			body {
				z-index: 130;
			}
			.backdrop {
				position: absolute;
				width: 100%;
				height: 100%;
				background-color: rgba(0, 0, 0, 0.05);
			}
			.palette {
				position: absolute;
				width: 520px;
				height: 260px;
				max-width: 72%;
				max-height: 52%;
				left: 50%;
				top: 36%;
				transform: translate(-50% -50%);
				background-color: #151515;
				border: 1px solid #444;
				border-radius: 4px;
				padding: 6px;
				color: #DDD;
			}
			input {
				width: calc(100% - 14px);
				height: 24px;
				margin-bottom: 4px;
				font-size: 14px;
				line-height: 1.1;
				background-color: #0F0F0F;
				border: 1px solid #3A3A3A;
				color: white;
				padding: 0 6px;
			}
			#list {
				width: 100%;
				height: calc(100% - 28px);
				overflow-y: scroll;
			}
			.actionEntry {
				width: calc(100% - 12px);
				height: 18px;
				background-color: #181818;
				color: #BBB;
				padding: 2px 6px;
				margin-bottom: 1px;
				overflow: hidden;
				line-height: 1.2;
			}
			.actionEntry:hover {
				background-color: #4A4A4A;
				color: white;
			}
			.selected {
				background-color: #4A4A4A;
				color: white;
			}
			.actionLabel {
				font-size: 13px;
				color: #EEE;
			}
			.selected .actionLabel {
				color: white;
			}
			.actionCategory {
				font-size: 12px;
				color: #888;
			}
			.selected .actionCategory {
				color: #B0B0B0;
			}
			.actionDescription {
				display: none;
			}
		</style>
	</head>
	<body>
		<div class="backdrop" onmiss="clickMiss">
			<div class="palette">
				<input id="search" type="text" placeholder="Search actions..." onchange="search" />
				<div id="list">
					{{range .Entries}}
					<div class="actionEntry" data-idx="{{.Index}}" data-search="{{.Search}}" onclick="clickAction">
						{{if .Category}}<span class="actionCategory">{{.Category}} &gt; </span>{{end}}
						<span class="actionLabel">{{.Label}}</span>
						<div class="actionDescription">{{.Description}}</div>
					</div>
					{{end}}
				</div>
			</div>
		</div>
	</body>
</html>
